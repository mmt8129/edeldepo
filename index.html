<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Depo Raf Bulucu</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1976D2">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Sabit üst kısım */
        .header {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #1976D2;
            padding: 20px 16px 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header h1 {
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header hr {
            margin-top: 12px;
            border: 0;
            height: 2px;
            background: white;
            opacity: 0.3;
        }

        /* Arama kutusu alanı (sabit) */
        .search-area {
            background: #f5f7fb;
            padding: 16px 16px 8px 16px;
            position: sticky;
            top: 85px; /* header yüksekliğine göre ayarlandı */
            z-index: 10;
        }

        .search-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1976D2;
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 28px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #1976D2;
            box-shadow: 0 4px 12px rgba(25,118,210,0.15);
        }

        /* Kaydırılabilir sonuçlar listesi */
        .results-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px 16px 80px 16px;
            margin-top: 8px;
        }

        /* Parça kartları */
        .part-card {
            background: white;
            border-radius: 20px;
            margin-bottom: 16px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #eef2f6;
        }

        .part-image {
            width: 60px;
            height: 60px;
            background: #f0f2f5;
            border-radius: 12px;
            object-fit: cover;
            flex-shrink: 0;
            cursor: pointer;
        }

        .part-info {
            flex: 1;
        }

        .part-name {
            font-weight: 600;
            font-size: 17px;
            color: #1e2a3a;
            margin-bottom: 6px;
        }

        .part-rack {
            font-size: 14px;
            font-weight: 500;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background: #eef2ff;
            color: #1e40af;
        }

        .part-rack.out-of-stock {
            background: #fee2e2;
            color: #b91c1c;
        }

        /* Yükleniyor / Hata */
        .info-message {
            text-align: center;
            padding: 40px 20px;
            color: #6c757d;
            font-size: 15px;
        }

        .loading {
            display: flex;
            justify-content: center;
            padding: 40px;
        }

        /* Modal (büyük resim için) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 12px;
        }
        .modal.show {
            display: flex;
        }

        /* küçük ekran iyileştirmeleri */
        @media (max-width: 480px) {
            .header h1 { font-size: 24px; }
            .part-image { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>DEPO</h1>
        <hr>
    </div>

    <div class="search-area">
        <label class="search-label">🔍 Parça Ara</label>
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="Örnek: MX7, A1, HM5 ..." autocomplete="off">
        </div>
    </div>

    <div id="resultsContainer" class="results-container">
        <div class="info-message">📦 Veri yükleniyor, lütfen bekleyin...</div>
    </div>

    <!-- Büyük resim göstermek için modal -->
    <div id="imageModal" class="modal">
        <img id="modalImage" src="" alt="Büyük resim">
    </div>

    <script>
        // ---------- 1. VERİYI HTML'DEN ÇEK VE AYIKLA ----------
        const searchInput = document.getElementById('searchInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');

        let allParts = [];     // tüm parçalar bu dizide tutulacak
        let isLoading = true;

        // Modal kapatma
        modal.addEventListener('click', () => {
            modal.classList.remove('show');
        });

        // HTML dosyasını fetch et ve işle
        async function loadPartsFromHtml() {
            try {
                const response = await fetch('veri.html');
                if (!response.ok) throw new Error('veri.html bulunamadı');
                const htmlText = await response.text();

                // Geçici bir DOM oluştur, içine HTML'i yükle
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');

                // Tüm <tr> satırlarını bul (tbody içindeki)
                const rows = doc.querySelectorAll('tbody tr');
                console.log(`Toplam ${rows.length} satır bulundu.`);

                allParts = [];

                for (let row of rows) {
                    const cells = row.querySelectorAll('td');
                    if (cells.length < 5) continue;

                    // 1. hücre: resim linki (img src)
                    const imgTag = cells[0]?.querySelector('img');
                    const imageUrl = imgTag ? imgTag.getAttribute('src') : '';

                    // 2. hücre: parça adı (link içindeki text)
                    const nameLink = cells[1]?.querySelector('a');
                    let partName = '';
                    if (nameLink) {
                        partName = nameLink.textContent.trim();
                    }

                    // 3. hücre: açıklama (şimdilik kullanmayacağız ama atlayabiliriz)
                    // 4. hücre: adet (kullanmayacağız)
                    // 5. hücre: RAF NUMARASI (veya Tasfiye/Üretimde durumu)
                    let rawRack = cells[4]?.innerHTML?.trim() || '';
                    // &nbsp; veya boşluk temizliği
                    rawRack = rawRack.replace(/&nbsp;/g, ' ').trim();
                    
                    let rackNumber = '';
                    let isOutOfStock = false;
                    
                    // Eğer içinde "Tasfiye" veya "Üretimde" gibi durum varsa, bu depoda yok anlamına gelir.
                    if (rawRack.includes('Tasfiye') || rawRack.includes('&#xDC;retimde') || rawRack === '' || rawRack === '&nbsp;') {
                        isOutOfStock = true;
                        rackNumber = 'Depoda yok';
                    } else {
                        // Raf kodu olarak sakla (ör: "03A2", "27B2" vb.)
                        rackNumber = rawRack;
                    }

                    if (partName && partName !== '') {
                        allParts.push({
                            ad: partName,
                            resim: imageUrl,
                            raf: rackNumber,
                            stokDurumu: isOutOfStock ? 'yok' : 'var'
                        });
                    }
                }

                console.log(`${allParts.length} parça başarıyla yüklendi.`);
                isLoading = false;
                // İlk aramayı tetikle (boş input ile tüm sonuçları gösterme, beklet)
                performSearch();
            } catch (error) {
                console.error('Veri yüklenirken hata:', error);
                resultsContainer.innerHTML = `<div class="info-message">⚠️ veri.html yüklenemedi. Dosyanın aynı klasörde olduğundan emin olun.</div>`;
                isLoading = false;
            }
        }

        // Arama yap ve listeyi güncelle
        function performSearch() {
            if (isLoading) return;
            const query = searchInput.value.trim().toLowerCase();
            
            let filtered = allParts;
            if (query !== '') {
                filtered = allParts.filter(part => part.ad.toLowerCase().includes(query));
            }

            // Sonuçları göster (hepsini göster, fazla ise scroll yapılır, limit yok)
            if (filtered.length === 0) {
                resultsContainer.innerHTML = `<div class="info-message">🔍 "${searchInput.value}" ile eşleşen parça bulunamadı.</div>`;
                return;
            }

            // HTML oluştur
            let html = '';
            for (let part of filtered) {
                const rackClass = part.stokDurumu === 'yok' ? 'out-of-stock' : '';
                const rackHtml = `<span class="part-rack ${rackClass}">${escapeHtml(part.raf)}</span>`;
                
                // resim yoksa placeholder
                const imgSrc = part.resim && part.resim !== '' ? part.resim : 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ccc"%3E%3Cpath d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 14h-2v-2h2v2zm0-4h-2V7h2v6z"/%3E%3C/svg%3E';
                
                html += `
                    <div class="part-card">
                        <img class="part-image" src="${escapeHtml(imgSrc)}" alt="${escapeHtml(part.ad)}" data-fullimg="${escapeHtml(part.resim)}">
                        <div class="part-info">
                            <div class="part-name">${escapeHtml(part.ad)}</div>
                            ${rackHtml}
                        </div>
                    </div>
                `;
            }
            resultsContainer.innerHTML = html;

            // Resimlere tıklama olayı ekle (büyük resim göster)
            document.querySelectorAll('.part-image').forEach(img => {
                img.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const fullUrl = img.getAttribute('data-fullimg');
                    if (fullUrl && fullUrl !== '') {
                        modalImg.src = fullUrl;
                        modal.classList.add('show');
                    } else {
                        // placeholder veya yoksa büyütme yapma
                        alert('Bu parçaya ait büyük resim bulunmuyor.');
                    }
                });
            });
        }

        // XSS koruması için basit escape
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        // Dinamik arama: input her değiştiğinde çalıştır
        searchInput.addEventListener('input', performSearch);

        // Sayfa yüklendiğinde veriyi çek
        loadPartsFromHtml();
    </script>
</body>
</html>
